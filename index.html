<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scotty's Weekly Schedule</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f0; color: #1a1a1a; padding: 1.5rem 1rem 3rem; }
  h1 { font-size: 26px; font-weight: 600; margin-bottom: 4px; color: #1a1a1a; }
  .subtitle { font-size: 13px; color: #777; margin-bottom: 1rem; }
  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 1.25rem; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #555; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .grid-wrap { overflow-x: auto; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); background: #fff; }
  table { width: 100%; border-collapse: collapse; min-width: 720px; table-layout: fixed; background: #fff; border-radius: 10px; }
  th { font-size: 13px; font-weight: 600; text-align: center; padding: 10px 4px 8px; color: #555; border-bottom: 1px solid #eee; background: #fafafa; }
  th:first-child { border-radius: 10px 0 0 0; }
  th:last-child  { border-radius: 0 10px 0 0; }
  td.time-col { font-size: 10px; color: #bbb; text-align: right; padding: 0 6px 0 0; vertical-align: top; width: 46px; white-space: nowrap; border-right: 1px solid #f0f0f0; }
  td.day-cell { border-left: 1px solid #f0f0f0; vertical-align: top; padding: 0; position: relative; }
  tr { border-bottom: 1px solid #f5f5f5; }
  .block { border-radius: 5px; padding: 3px 5px; font-size: 10px; font-weight: 600; line-height: 1.3; cursor: pointer; transition: opacity 0.15s, transform 0.1s; overflow: hidden; position: absolute; left: 2px; right: 2px; }
  .block:hover { opacity: 0.8; transform: scale(1.01); }
  .block-school   { background: #dbeafe; color: #1e40af; border-left: 3px solid #3b82f6; }
  .block-car      { background: #dcfce7; color: #166534; border-left: 3px solid #22c55e; }
  .block-carer    { background: #fce7f3; color: #9d174d; border-left: 3px solid #ec4899; }
  .block-activity { background: #fef3c7; color: #92400e; border-left: 3px solid #f59e0b; }
  .block-routine  { background: #f3f4f6; color: #374151; border-left: 3px solid #9ca3af; }
  .block .time-label { font-weight: 400; opacity: 0.75; font-size: 9px; }
  .add-btn { position: absolute; bottom: 4px; right: 5px; font-size: 11px; color: #ccc; cursor: pointer; padding: 1px 5px; border-radius: 3px; user-select: none; }
  .add-btn:hover { background: #f0f0f0; color: #888; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 14px; padding: 1.5rem; width: 320px; max-width: 94vw; box-shadow: 0 8px 30px rgba(0,0,0,0.15); }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 1rem; color: #1a1a1a; }
  .modal label { font-size: 12px; color: #666; display: block; margin: 10px 0 4px; }
  .modal input[type=text], .modal input[type=time], .modal select {
    width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px;
    font-size: 14px; background: #fff; color: #1a1a1a; outline: none;
  }
  .modal input:focus, .modal select:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
  .modal-btns { display: flex; gap: 8px; margin-top: 1.25rem; align-items: center; }
  .btn-cancel { background: transparent; border: 1px solid #ddd; border-radius: 8px; padding: 7px 14px; font-size: 13px; cursor: pointer; color: #666; }
  .btn-cancel:hover { background: #f5f5f5; }
  .btn-save { background: #3b82f6; border: none; border-radius: 8px; padding: 7px 16px; font-size: 13px; cursor: pointer; color: #fff; font-weight: 600; margin-left: auto; }
  .btn-save:hover { background: #2563eb; }
  .btn-delete { background: transparent; border: 1px solid #fca5a5; border-radius: 8px; padding: 7px 14px; font-size: 13px; cursor: pointer; color: #dc2626; }
  .btn-delete:hover { background: #fef2f2; }

  /* Day header colours */
  .th-mon { color: #7c3aed; } .th-tue { color: #0891b2; } .th-wed { color: #059669; }
  .th-thu { color: #d97706; } .th-fri { color: #dc2626; } .th-sat { color: #db2777; } .th-sun { color: #2563eb; }
</style>
</head>
<body>

<h1>📅 Scotty's weekly schedule</h1>
<p class="subtitle">Click any block to edit times or label &nbsp;·&nbsp; Click + to add a new block</p>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#dbeafe;border:1.5px solid #3b82f6"></div>School</div>
  <div class="legend-item"><div class="legend-dot" style="background:#dcfce7;border:1.5px solid #22c55e"></div>Car / transport</div>
  <div class="legend-item"><div class="legend-dot" style="background:#fce7f3;border:1.5px solid #ec4899"></div>Carer</div>
  <div class="legend-item"><div class="legend-dot" style="background:#fef3c7;border:1.5px solid #f59e0b"></div>Activity</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f3f4f6;border:1.5px solid #9ca3af"></div>Routine</div>
</div>

<div class="grid-wrap">
  <table>
    <thead><tr>
      <th style="width:46px"></th>
      <th class="th-mon">Mon</th>
      <th class="th-tue">Tue</th>
      <th class="th-wed">Wed</th>
      <th class="th-thu">Thu</th>
      <th class="th-fri">Fri</th>
      <th class="th-sat">Sat</th>
      <th class="th-sun">Sun</th>
    </tr></thead>
    <tbody id="sched-body"></tbody>
  </table>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">Edit block</h2>
    <label>Label</label><input type="text" id="edit-label" />
    <label>Start time</label><input type="time" id="edit-start" />
    <label>End time</label><input type="time" id="edit-end" />
    <label>Category</label>
    <select id="edit-cat">
      <option value="school">School</option>
      <option value="car">Car / transport</option>
      <option value="carer">Carer</option>
      <option value="activity">Activity</option>
      <option value="routine">Routine</option>
    </select>
    <div class="modal-btns">
      <button class="btn-delete" id="btn-delete">Delete</button>
      <button class="btn-cancel" id="btn-cancel">Cancel</button>
      <button class="btn-save" id="btn-save">Save</button>
    </div>
  </div>
</div>

<script>
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const MIN_START = 6*60, MAX_END = 22*60, TOTAL = MAX_END - MIN_START;
const CELL_H = 512;

function toMin(t){ const [h,m]=t.split(':').map(Number); return h*60+m; }
function fmt(t){ let [h,m]=t.split(':').map(Number); const ap=h>=12?'pm':'am'; h=h%12||12; return h+(m?':'+String(m).padStart(2,'0'):'')+ap; }

const MORNING = [
  {label:'Wake up & morning pills', start:'06:45', end:'07:00'},
  {label:'Breakfast & brush teeth',  start:'07:00', end:'07:20'},
  {label:'Get dressed, clean room',  start:'07:20', end:'07:35'},
  {label:'Watch calm TV',            start:'07:35', end:'07:42'},
  {label:'Prepare bag',              start:'07:42', end:'07:45'},
];
const EVENING = [
  {label:'Snack',                         start:'16:00', end:'16:15'},
  {label:'TV off / dinner & brush teeth', start:'19:30', end:'20:00'},
  {label:'Evening pills',                 start:'20:00', end:'20:10'},
  {label:'Playtime',                      start:'20:10', end:'20:30'},
  {label:'Read & lights out',             start:'20:30', end:'21:00'},
];

let uid = 1;
function mk(day, items, cat){
  return items.map(x=>({id:uid++, day, label:x.label, start:x.start, end:x.end, cat:cat||'routine'}));
}

let blocks = [
  // MON
  ...mk('Mon', MORNING),
  {id:uid++, day:'Mon', label:'Car pickup',   start:'07:45', end:'08:15', cat:'car'},
  {id:uid++, day:'Mon', label:'School',       start:'08:15', end:'15:00', cat:'school'},
  {id:uid++, day:'Mon', label:'Car drop-off', start:'15:00', end:'15:20', cat:'car'},
  {id:uid++, day:'Mon', label:'Sharon',       start:'15:00', end:'18:00', cat:'carer'},
  {id:uid++, day:'Mon', label:'Fulham FC',    start:'18:00', end:'19:00', cat:'activity'},
  ...mk('Mon', EVENING),
  // TUE
  ...mk('Tue', MORNING),
  {id:uid++, day:'Tue', label:'Car pickup',   start:'07:45', end:'08:15', cat:'car'},
  {id:uid++, day:'Tue', label:'School',       start:'08:15', end:'15:00', cat:'school'},
  {id:uid++, day:'Tue', label:'Car drop-off', start:'15:00', end:'15:20', cat:'car'},
  {id:uid++, day:'Tue', label:'Sharon',       start:'15:00', end:'18:00', cat:'carer'},
  ...mk('Tue', EVENING),
  // WED
  ...mk('Wed', MORNING),
  {id:uid++, day:'Wed', label:'Car pickup',   start:'07:45', end:'08:15', cat:'car'},
  {id:uid++, day:'Wed', label:'School',       start:'08:15', end:'15:00', cat:'school'},
  {id:uid++, day:'Wed', label:'Car drop-off', start:'15:00', end:'15:20', cat:'car'},
  {id:uid++, day:'Wed', label:'Ibrahim',      start:'15:30', end:'16:30', cat:'carer'},
  ...mk('Wed', EVENING),
  // THU
  ...mk('Thu', MORNING),
  {id:uid++, day:'Thu', label:'Car pickup',   start:'07:45', end:'08:15', cat:'car'},
  {id:uid++, day:'Thu', label:'School',       start:'08:15', end:'15:00', cat:'school'},
  {id:uid++, day:'Thu', label:'Car drop-off', start:'15:00', end:'15:20', cat:'car'},
  {id:uid++, day:'Thu', label:'Sharon',       start:'15:00', end:'18:00', cat:'carer'},
  ...mk('Thu', EVENING),
  // FRI
  ...mk('Fri', MORNING),
  {id:uid++, day:'Fri', label:'Car pickup',   start:'07:45', end:'08:15', cat:'car'},
  {id:uid++, day:'Fri', label:'School',       start:'08:15', end:'14:00', cat:'school'},
  {id:uid++, day:'Fri', label:'Car drop-off', start:'14:00', end:'14:20', cat:'car'},
  {id:uid++, day:'Fri', label:'Ibrahim',      start:'15:30', end:'16:30', cat:'carer'},
  {id:uid++, day:'Fri', label:'Clara',        start:'19:00', end:'22:00', cat:'carer'},
  ...mk('Fri', EVENING),
  // SAT
  {id:uid++, day:'Sat', label:'Fulham FC', start:'09:30', end:'10:30', cat:'activity'},
  {id:uid++, day:'Sat', label:'Clara',     start:'13:00', end:'18:00', cat:'carer'},
  ...mk('Sat', EVENING),
  // SUN
  {id:uid++, day:'Sun', label:'Ibrahim',           start:'08:00', end:'09:00', cat:'carer'},
  {id:uid++, day:'Sun', label:'Football w/ Costa', start:'10:00', end:'11:00', cat:'activity'},
  {id:uid++, day:'Sun', label:'Luis',              start:'14:00', end:'18:00', cat:'carer'},
  ...mk('Sun', EVENING),
];

let nextId = 5000;
let editingId = null, addingDay = null;

function render(){
  const HOURS = [];
  for(let h=6;h<=22;h++) HOURS.push(h);
  const tbody = document.getElementById('sched-body');
  let html = '';
  HOURS.forEach((h,r)=>{
    const label = h<12? h+'am': h===12?'12pm':(h-12)+'pm';
    html += '<tr>';
    html += '<td class="time-col" style="height:32px">'+label+'</td>';
    if(r===0){
      DAYS.forEach(day=>{
        const db = blocks.filter(b=>b.day===day).sort((a,b)=>toMin(a.start)-toMin(b.start));
        html += '<td class="day-cell" style="height:'+CELL_H+'px;position:relative;" rowspan="'+HOURS.length+'">';
        db.forEach(b=>{
          const top = ((toMin(b.start)-MIN_START)/TOTAL*CELL_H).toFixed(1);
          const ht  = Math.max(((toMin(b.end)-toMin(b.start))/TOTAL*CELL_H), 9).toFixed(1);
          const dur = toMin(b.end)-toMin(b.start);
          html += '<div class="block block-'+b.cat+'" style="top:'+top+'px;height:'+ht+'px;" onclick="openEdit('+b.id+')">';
          html += '<span>'+b.label+'</span>';
          if(dur>=25) html += '<br><span class="time-label">'+fmt(b.start)+'–'+fmt(b.end)+'</span>';
          html += '</div>';
        });
        html += '<div class="add-btn" onclick="openAdd(\''+day+'\')">＋</div>';
        html += '</td>';
      });
    }
    html += '</tr>';
  });
  tbody.innerHTML = html;
}

function openEdit(id){
  editingId=id; addingDay=null;
  const b=blocks.find(x=>x.id===id);
  document.getElementById('modal-title').textContent='Edit block';
  document.getElementById('edit-label').value=b.label;
  document.getElementById('edit-start').value=b.start;
  document.getElementById('edit-end').value=b.end;
  document.getElementById('edit-cat').value=b.cat;
  document.getElementById('btn-delete').style.display='inline-block';
  document.getElementById('modal').classList.add('open');
}
function openAdd(day){
  editingId=null; addingDay=day;
  document.getElementById('modal-title').textContent='Add block — '+day;
  document.getElementById('edit-label').value='';
  document.getElementById('edit-start').value='09:00';
  document.getElementById('edit-end').value='10:00';
  document.getElementById('edit-cat').value='routine';
  document.getElementById('btn-delete').style.display='none';
  document.getElementById('modal').classList.add('open');
}
document.getElementById('btn-cancel').onclick=()=>document.getElementById('modal').classList.remove('open');
document.getElementById('btn-delete').onclick=()=>{
  blocks=blocks.filter(b=>b.id!==editingId);
  document.getElementById('modal').classList.remove('open');
  render();
};
document.getElementById('btn-save').onclick=()=>{
  const label=document.getElementById('edit-label').value.trim()||'Block';
  const start=document.getElementById('edit-start').value;
  const end=document.getElementById('edit-end').value;
  const cat=document.getElementById('edit-cat').value;
  if(editingId){ const b=blocks.find(x=>x.id===editingId); b.label=label;b.start=start;b.end=end;b.cat=cat; }
  else blocks.push({id:nextId++,day:addingDay,label,start,end,cat});
  document.getElementById('modal').classList.remove('open');
  render();
};
render();
</script>
</body>
</html>
