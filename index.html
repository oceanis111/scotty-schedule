<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scotty's Weekly Schedule</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f0; color: #1a1a1a; padding: 0.75rem 1rem; display: flex; flex-direction: column; height: 100vh; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 2px; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .subtitle { font-size: 12px; color: #777; margin-bottom: 0.4rem; }
  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 0.4rem; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #555; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  .grid-wrap { flex: 1; overflow-y: auto; overflow-x: auto; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); background: #fff; min-height: 0; }

  .schedule-grid { display: flex; min-width: 720px; }

  /* Time axis */
  .time-axis { width: 46px; flex-shrink: 0; position: relative; }
  .time-label { position: absolute; right: 6px; font-size: 10px; color: #bbb; transform: translateY(-50%); white-space: nowrap; }

  /* Day columns */
  .days-container { flex: 1; display: flex; }
  .day-col { flex: 1; border-left: 1px solid #f0f0f0; position: relative; }
  .day-col.today { background: #f0f7ff; border-left: 3px solid #3b82f6 !important; border-right: 3px solid #3b82f6; }

  /* Hour grid lines */
  .hour-line { position: absolute; left: 0; right: 0; border-top: 1px solid #f0f0f0; }
  .hour-line.half { border-top: 1px dashed #f5f5f5; }

  /* Day headers */
  .headers { display: flex; min-width: 720px; border-bottom: 1px solid #eee; background: #fafafa; border-radius: 10px 10px 0 0; }
  .header-spacer { width: 46px; flex-shrink: 0; }
  .header-day { flex: 1; text-align: center; font-size: 13px; font-weight: 600; padding: 9px 4px 7px; color: #555; }
  .header-day.today { background: #eff6ff; color: #1d4ed8; border-bottom: 3px solid #3b82f6; }

  /* Blocks */
  .block { position: absolute; left: 2px; right: 2px; border-radius: 5px; padding: 3px 5px; font-size: 10px; font-weight: 600; line-height: 1.3; cursor: pointer; overflow: hidden; transition: opacity 0.15s; }
  .block:hover { opacity: 0.78; }
  .block-school   { background: #dbeafe; color: #1e40af; border-left: 3px solid #3b82f6; }
  .block-car      { background: #e5e7eb; color: #374151; border-left: 3px solid #9ca3af; }
  .block-carer    { background: #fce7f3; color: #9d174d; border-left: 3px solid #ec4899; }
  .block-activity { background: #fef3c7; color: #92400e; border-left: 3px solid #f59e0b; }
  .block-routine  { background: #dcfce7; color: #166534; border-left: 3px solid #4ade80; }
  .block .tl { font-weight: 400; opacity: 0.75; font-size: 9px; display: block; }
  .add-btn { position: absolute; bottom: 3px; right: 4px; font-size: 10px; color: #ccc; cursor: pointer; padding: 1px 4px; border-radius: 3px; user-select: none; z-index: 10; }
  .add-btn:hover { background: #f0f0f0; color: #888; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 14px; padding: 1.5rem; width: 320px; max-width: 94vw; box-shadow: 0 8px 30px rgba(0,0,0,0.15); }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 1rem; color: #1a1a1a; }
  .modal label { font-size: 12px; color: #666; display: block; margin: 10px 0 4px; }
  .modal input[type=text], .modal input[type=time], .modal select { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: #fff; color: #1a1a1a; outline: none; }
  .modal input:focus, .modal select:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
  .modal-btns { display: flex; gap: 8px; margin-top: 1.25rem; align-items: center; }
  .btn-cancel { background: transparent; border: 1px solid #ddd; border-radius: 8px; padding: 7px 14px; font-size: 13px; cursor: pointer; color: #666; }
  .btn-cancel:hover { background: #f5f5f5; }
  .btn-save { background: #3b82f6; border: none; border-radius: 8px; padding: 7px 16px; font-size: 13px; cursor: pointer; color: #fff; font-weight: 600; margin-left: auto; }
  .btn-save:hover { background: #2563eb; }
  .btn-delete { background: transparent; border: 1px solid #fca5a5; border-radius: 8px; padding: 7px 14px; font-size: 13px; cursor: pointer; color: #dc2626; }
  .btn-delete:hover { background: #fef2f2; }
</style>
</head>
<body>

<h1 id="page-title">📅 Scotty's weekly schedule</h1>
<p class="subtitle">Click any block to edit · Click + to add</p>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#dbeafe;border:1.5px solid #3b82f6"></div>School</div>
  <div class="legend-item"><div class="legend-dot" style="background:#e5e7eb;border:1.5px solid #9ca3af"></div>Car</div>
  <div class="legend-item"><div class="legend-dot" style="background:#fce7f3;border:1.5px solid #ec4899"></div>Carer</div>
  <div class="legend-item"><div class="legend-dot" style="background:#fef3c7;border:1.5px solid #f59e0b"></div>Activity</div>
  <div class="legend-item"><div class="legend-dot" style="background:#dcfce7;border:1.5px solid #4ade80"></div>Routine</div>
</div>

<div class="grid-wrap" id="grid-wrap">
  <div class="headers" id="headers"></div>
  <div class="schedule-grid" id="schedule-grid">
    <div class="time-axis" id="time-axis"></div>
    <div class="days-container" id="days-container"></div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">Edit block</h2>
    <label>Label</label><input type="text" id="edit-label" />
    <label>Start time</label><input type="time" id="edit-start" />
    <label>End time</label><input type="time" id="edit-end" />
    <label>Category</label>
    <select id="edit-cat">
      <option value="school">School</option>
      <option value="car">Car / transport</option>
      <option value="carer">Carer</option>
      <option value="activity">Activity</option>
      <option value="routine">Routine</option>
    </select>
    <div class="modal-btns">
      <button class="btn-delete" id="btn-delete">Delete</button>
      <button class="btn-cancel" id="btn-cancel">Cancel</button>
      <button class="btn-save" id="btn-save">Save</button>
    </div>
  </div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DAY_LABELS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DAY_COLORS = ['#7c3aed','#0891b2','#059669','#d97706','#dc2626','#db2777','#2563eb'];

// Grid spans 6:00 to 22:00 = 960 minutes
const GRID_START = 6 * 60;   // 360 min
const GRID_END   = 22 * 60;  // 1320 min
const GRID_MINS  = GRID_END - GRID_START; // 960

// Fixed pixels-per-minute — everything calculated from this
const PPM = 1.125; // 25% shorter than 1.5 → 960min × 1.125 = 1080px tall grid

function toMin(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}
function fmt(t) {
  let [h, m] = t.split(':').map(Number);
  const ap = h >= 12 ? 'pm' : 'am';
  h = h % 12 || 12;
  return h + (m ? ':' + String(m).padStart(2, '0') : '') + ap;
}
function minToTop(t) {
  return (toMin(t) - GRID_START) * PPM;
}
function minToHeight(start, end) {
  return (toMin(end) - toMin(start)) * PPM;
}

// ── Date setup ─────────────────────────────────────────────
const now = new Date();
const jsDay = now.getDay(); // 0=Sun
const dayMap = [6,0,1,2,3,4,5];
const todayName = DAYS[dayMap[jsDay]];
const monday = new Date(now);
monday.setDate(now.getDate() - (jsDay === 0 ? 6 : jsDay - 1));
const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
document.getElementById('page-title').textContent =
  '📅 Scotty\'s weekly schedule — week commencing Monday ' +
  String(monday.getDate()).padStart(2,'0') + ' ' +
  months[monday.getMonth()] + ' ' + monday.getFullYear();

// ── Schedule data ──────────────────────────────────────────
let uid = 1;
function b(day, label, start, end, cat) {
  return { id: uid++, day, label, start, end, cat };
}

let blocks = [
  // MON
  b('Mon','Morning routine','06:30','07:45','routine'),
  b('Mon','Car pickup',     '07:45','08:15','car'),
  b('Mon','School',         '08:15','15:00','school'),
  b('Mon','Car drop-off',   '15:00','15:20','car'),
  b('Mon','Sharon',         '15:20','18:00','carer'),
  b('Mon','Fulham FC',      '18:00','19:00','activity'),
  b('Mon','Evening routine','19:30','21:00','routine'),

  // TUE
  b('Tue','Morning routine','06:30','07:45','routine'),
  b('Tue','Car pickup',     '07:45','08:15','car'),
  b('Tue','School',         '08:15','15:00','school'),
  b('Tue','Car drop-off',   '15:00','15:20','car'),
  b('Tue','Sharon',         '15:20','18:00','carer'),
  b('Tue','Evening routine','19:30','21:00','routine'),

  // WED
  b('Wed','Morning routine','06:30','07:45','routine'),
  b('Wed','Car pickup',     '07:45','08:15','car'),
  b('Wed','School',         '08:15','15:00','school'),
  b('Wed','Car drop-off',   '15:00','15:20','car'),
  b('Wed','Ibrahim',        '15:30','16:30','carer'),
  b('Wed','Evening routine','19:30','21:00','routine'),

  // THU
  b('Thu','Morning routine','06:30','07:45','routine'),
  b('Thu','Car pickup',     '07:45','08:15','car'),
  b('Thu','School',         '08:15','15:00','school'),
  b('Thu','Car drop-off',   '15:00','15:20','car'),
  b('Thu','Sharon',         '15:20','18:00','carer'),
  b('Thu','Evening routine','19:30','21:00','routine'),

  // FRI
  b('Fri','Morning routine','06:30','07:45','routine'),
  b('Fri','Car pickup',     '07:45','08:15','car'),
  b('Fri','School',         '08:15','14:00','school'),
  b('Fri','Car drop-off',   '14:00','14:20','car'),
  b('Fri','Ibrahim',        '15:30','16:30','carer'),
  b('Fri','Clara',          '19:00','22:00','carer'),
  b('Fri','Evening routine','19:30','21:00','routine'),

  // SAT
  b('Sat','Fulham FC',      '09:30','10:30','activity'),
  b('Sat','Clara',          '13:00','18:00','carer'),
  b('Sat','Evening routine','19:30','21:00','routine'),

  // SUN
  b('Sun','Ibrahim',            '08:00','09:00','carer'),
  b('Sun','Football w/ Costa',  '10:00','11:00','activity'),
  b('Sun','Luis',               '14:00','18:00','carer'),
  b('Sun','Evening routine',    '19:30','21:00','routine'),
];

let nextId = 5000;
let editingId = null, addingDay = null;

// ── Render ─────────────────────────────────────────────────
function render() {
  const totalH = GRID_MINS * PPM; // exact pixel height of grid

  // Headers
  const headers = document.getElementById('headers');
  headers.innerHTML = '<div class="header-spacer"></div>' +
    DAYS.map((d, i) => {
      const isToday = d === todayName;
      return `<div class="header-day${isToday?' today':''}" style="color:${DAY_COLORS[i]}">${d}</div>`;
    }).join('');

  // Time axis
  const axis = document.getElementById('time-axis');
  axis.style.height = totalH + 'px';
  axis.style.position = 'relative';
  let axisHTML = '';
  for (let h = GRID_START/60; h <= GRID_END/60; h++) {
    const top = (h * 60 - GRID_START) * PPM;
    const label = h < 12 ? h+'am' : h === 12 ? '12pm' : (h-12)+'pm';
    axisHTML += `<div class="time-label" style="top:${top}px">${label}</div>`;
  }
  axis.innerHTML = axisHTML;

  // Day columns
  const dc = document.getElementById('days-container');
  dc.innerHTML = '';
  DAYS.forEach(day => {
    const col = document.createElement('div');
    col.className = 'day-col' + (day === todayName ? ' today' : '');
    col.style.height = totalH + 'px';
    col.style.position = 'relative';

    // Hour grid lines
    for (let h = GRID_START/60; h <= GRID_END/60; h++) {
      const top = (h * 60 - GRID_START) * PPM;
      const line = document.createElement('div');
      line.className = 'hour-line';
      line.style.top = top + 'px';
      col.appendChild(line);
      // half-hour line
      if (h < GRID_END/60) {
        const halfLine = document.createElement('div');
        halfLine.className = 'hour-line half';
        halfLine.style.top = (top + 30 * PPM) + 'px';
        col.appendChild(halfLine);
      }
    }

    // Blocks
    const dayBlocks = blocks.filter(bk => bk.day === day);
    dayBlocks.forEach(bk => {
      const top    = minToTop(bk.start);
      const height = minToHeight(bk.start, bk.end);
      const dur    = toMin(bk.end) - toMin(bk.start);

      const div = document.createElement('div');
      div.className = 'block block-' + bk.cat;
      div.style.top    = top + 'px';
      div.style.height = height + 'px';
      div.innerHTML = bk.label + (dur >= 20 ? `<span class="tl">${fmt(bk.start)}–${fmt(bk.end)}</span>` : '');
      div.onclick = () => openEdit(bk.id);
      col.appendChild(div);
    });

    // Add button
    const addBtn = document.createElement('div');
    addBtn.className = 'add-btn';
    addBtn.textContent = '＋';
    addBtn.onclick = () => openAdd(day);
    col.appendChild(addBtn);

    dc.appendChild(col);
  });
}

// ── Modal ──────────────────────────────────────────────────
function openEdit(id) {
  editingId = id; addingDay = null;
  const bk = blocks.find(x => x.id === id);
  document.getElementById('modal-title').textContent = 'Edit block';
  document.getElementById('edit-label').value = bk.label;
  document.getElementById('edit-start').value = bk.start;
  document.getElementById('edit-end').value   = bk.end;
  document.getElementById('edit-cat').value   = bk.cat;
  document.getElementById('btn-delete').style.display = 'inline-block';
  document.getElementById('modal').classList.add('open');
}
function openAdd(day) {
  editingId = null; addingDay = day;
  document.getElementById('modal-title').textContent = 'Add block — ' + day;
  document.getElementById('edit-label').value = '';
  document.getElementById('edit-start').value = '09:00';
  document.getElementById('edit-end').value   = '10:00';
  document.getElementById('edit-cat').value   = 'routine';
  document.getElementById('btn-delete').style.display = 'none';
  document.getElementById('modal').classList.add('open');
}
document.getElementById('btn-cancel').onclick = () =>
  document.getElementById('modal').classList.remove('open');

document.getElementById('btn-delete').onclick = () => {
  blocks = blocks.filter(bk => bk.id !== editingId);
  document.getElementById('modal').classList.remove('open');
  render();
};
document.getElementById('btn-save').onclick = () => {
  const label = document.getElementById('edit-label').value.trim() || 'Block';
  const start = document.getElementById('edit-start').value;
  const end   = document.getElementById('edit-end').value;
  const cat   = document.getElementById('edit-cat').value;
  if (editingId) {
    const bk = blocks.find(x => x.id === editingId);
    bk.label = label; bk.start = start; bk.end = end; bk.cat = cat;
  } else {
    blocks.push({ id: nextId++, day: addingDay, label, start, end, cat });
  }
  document.getElementById('modal').classList.remove('open');
  render();
};

render();
</script>
</body>
</html>
