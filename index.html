<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Scotty's Weekly Schedule</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f0; color: #1a1a1a; padding: 0.75rem 1rem; display: flex; flex-direction: column; height: 100vh; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 2px; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .subtitle { font-size: 12px; color: #777; margin-bottom: 0.4rem; }
  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 0.4rem; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #555; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .grid-wrap { flex: 1; overflow-y: auto; overflow-x: auto; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); background: #fff; min-height: 0; }
  .schedule-grid { display: flex; min-width: 720px; }
  .time-axis { width: 46px; flex-shrink: 0; position: relative; }
  .time-label { position: absolute; right: 6px; font-size: 10px; color: #bbb; transform: translateY(-50%); white-space: nowrap; }
  .days-container { flex: 1; display: flex; }
  .day-col { flex: 1; border-left: 1px solid #f0f0f0; position: relative; }
  .day-col.today { background: #f0f7ff; border-left: 3px solid #3b82f6 !important; border-right: 3px solid #3b82f6; }
  .hour-line { position: absolute; left: 0; right: 0; border-top: 1px solid #f0f0f0; }
  .hour-line.half { border-top: 1px dashed #f5f5f5; }
  .headers { display: flex; min-width: 720px; border-bottom: 1px solid #eee; background: #fafafa; border-radius: 10px 10px 0 0; }
  .header-spacer { width: 46px; flex-shrink: 0; }
  .header-day { flex: 1; text-align: center; font-size: 13px; font-weight: 600; padding: 9px 4px 7px; color: #555; }
  .header-day.today { background: #eff6ff; color: #1d4ed8; border-bottom: 3px solid #3b82f6; }
  .block { position: absolute; left: 2px; right: 2px; border-radius: 5px; padding: 3px 5px; font-size: 10px; font-weight: 600; line-height: 1.3; cursor: pointer; overflow: hidden; transition: opacity 0.15s; }
  .block:hover { opacity: 0.78; }
  .block-school   { background: #dbeafe; color: #1e40af; border-left: 3px solid #3b82f6; }
  .block-car      { background: #e5e7eb; color: #374151; border-left: 3px solid #9ca3af; }
  .block-carer    { background: #fce7f3; color: #9d174d; border-left: 3px solid #ec4899; }
  .block-activity { background: #fef3c7; color: #92400e; border-left: 3px solid #f59e0b; }
  .block-routine  { background: #dcfce7; color: #166534; border-left: 3px solid #4ade80; }
  .block .tl { font-weight: 400; opacity: 0.75; font-size: 9px; display: block; }
  .block.overridden { opacity: 0.9; }
  .add-btn { position: absolute; bottom: 3px; right: 4px; font-size: 10px; color: #ccc; cursor: pointer; padding: 1px 4px; border-radius: 3px; user-select: none; z-index: 10; }
  .add-btn:hover { background: #f0f0f0; color: #888; }

  /* Modal base */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 14px; padding: 1.5rem; width: 320px; max-width: 94vw; box-shadow: 0 8px 30px rgba(0,0,0,0.15); }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 0.75rem; color: #1a1a1a; }
  .modal label { font-size: 12px; color: #666; display: block; margin: 10px 0 4px; }
  .modal input[type=text], .modal input[type=time], .modal select { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: #fff; color: #1a1a1a; outline: none; }
  .modal input:focus, .modal select:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
  .modal-btns { display: flex; gap: 8px; margin-top: 1.25rem; align-items: center; flex-wrap: wrap; }
  .btn { border-radius: 8px; padding: 7px 14px; font-size: 13px; cursor: pointer; border: none; }
  .btn-cancel  { background: transparent; border: 1px solid #ddd; color: #666; }
  .btn-cancel:hover { background: #f5f5f5; }
  .btn-save    { background: #3b82f6; color: #fff; font-weight: 600; margin-left: auto; }
  .btn-save:hover { background: #2563eb; }
  .btn-delete  { background: transparent; border: 1px solid #fca5a5; color: #dc2626; }
  .btn-delete:hover { background: #fef2f2; }

  /* Scope picker modal */
  .scope-modal { background: #fff; border-radius: 14px; padding: 1.5rem; width: 300px; max-width: 94vw; box-shadow: 0 8px 30px rgba(0,0,0,0.15); }
  .scope-modal h2 { font-size: 15px; font-weight: 600; margin-bottom: 1rem; color: #1a1a1a; }
  .scope-btn { display: block; width: 100%; text-align: left; padding: 12px 14px; border-radius: 8px; border: 1px solid #ddd; background: #fff; font-size: 14px; cursor: pointer; margin-bottom: 8px; color: #1a1a1a; }
  .scope-btn:hover { background: #f0f7ff; border-color: #3b82f6; color: #1d4ed8; }
  .scope-btn .scope-sub { display: block; font-size: 11px; color: #999; margin-top: 2px; }
  .scope-cancel { display: block; width: 100%; text-align: center; padding: 8px; border: none; background: none; color: #999; font-size: 13px; cursor: pointer; margin-top: 4px; }
  .scope-cancel:hover { color: #555; }
</style>
</head>
<body>

<h1 id="page-title">📅 Scotty's weekly schedule</h1>
<p class="subtitle">Click any block to edit · Click + to add</p>
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#dbeafe;border:1.5px solid #3b82f6"></div>School</div>
  <div class="legend-item"><div class="legend-dot" style="background:#e5e7eb;border:1.5px solid #9ca3af"></div>Car</div>
  <div class="legend-item"><div class="legend-dot" style="background:#fce7f3;border:1.5px solid #ec4899"></div>Carer</div>
  <div class="legend-item"><div class="legend-dot" style="background:#fef3c7;border:1.5px solid #f59e0b"></div>Activity</div>
  <div class="legend-item"><div class="legend-dot" style="background:#dcfce7;border:1.5px solid #4ade80"></div>Routine</div>
</div>

<div class="grid-wrap" id="grid-wrap">
  <div class="headers" id="headers"></div>
  <div class="schedule-grid">
    <div class="time-axis" id="time-axis"></div>
    <div class="days-container" id="days-container"></div>
  </div>
</div>

<!-- Edit modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h2 id="edit-title">Edit block</h2>
    <label>Label</label><input type="text" id="edit-label" />
    <label>Start time</label><input type="time" id="edit-start" />
    <label>End time</label><input type="time" id="edit-end" />
    <label>Category</label>
    <select id="edit-cat">
      <option value="school">School</option>
      <option value="car">Car / transport</option>
      <option value="carer">Carer</option>
      <option value="activity">Activity</option>
      <option value="routine">Routine</option>
    </select>
    <div class="modal-btns">
      <button class="btn btn-delete" id="btn-delete">Delete</button>
      <button class="btn btn-cancel" id="btn-cancel">Cancel</button>
      <button class="btn btn-save" id="btn-save">Save</button>
    </div>
  </div>
</div>

<!-- Scope picker modal -->
<div class="modal-overlay" id="scope-modal">
  <div class="scope-modal">
    <h2 id="scope-title">Edit recurring event</h2>
    <button class="scope-btn" id="scope-once">
      Change this event only
      <span class="scope-sub">Only this week's occurrence will be changed</span>
    </button>
    <button class="scope-btn" id="scope-series">
      Change the series
      <span class="scope-sub">All weekly occurrences will be updated</span>
    </button>
    <button class="scope-cancel" id="scope-cancel">Cancel</button>
  </div>
</div>

<!-- Delete scope modal -->
<div class="modal-overlay" id="delete-modal">
  <div class="scope-modal">
    <h2>Delete recurring event</h2>
    <button class="scope-btn" id="del-once">
      Delete this event only
      <span class="scope-sub">Only this week's occurrence will be removed</span>
    </button>
    <button class="scope-btn" id="del-series">
      Delete the series
      <span class="scope-sub">This event will be removed from every week</span>
    </button>
    <button class="scope-cancel" id="del-cancel">Cancel</button>
  </div>
</div>

<script>
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DAY_COLORS = ['#7c3aed','#0891b2','#059669','#d97706','#dc2626','#db2777','#2563eb'];
const GRID_START = 6 * 60, GRID_END = 22 * 60, GRID_MINS = GRID_END - GRID_START;
const PPM = 0.75;

function toMin(t){ const [h,m]=t.split(':').map(Number); return h*60+m; }
function fmt(t){ let [h,m]=t.split(':').map(Number); const ap=h>=12?'pm':'am'; h=h%12||12; return h+(m?':'+String(m).padStart(2,'0'):'')+ap; }
function minToTop(t){ return (toMin(t)-GRID_START)*PPM; }
function minToHeight(s,e){ return (toMin(e)-toMin(s))*PPM; }

// Date
const now = new Date();
const jsDay = now.getDay();
const dayMap = [6,0,1,2,3,4,5];
const todayName = DAYS[dayMap[jsDay]];
const monday = new Date(now);
monday.setDate(now.getDate()-(jsDay===0?6:jsDay-1));
const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
document.getElementById('page-title').textContent =
  '📅 Scotty\'s weekly schedule — week commencing Monday '+
  String(monday.getDate()).padStart(2,'0')+' '+months[monday.getMonth()]+' '+monday.getFullYear();

// ── Data model ─────────────────────────────────────────────
// Each block has a seriesId (recurring) or is standalone (one-off).
// overrides: { seriesId_day: { ...overrideProps } } — for "change once"
// deletedOnce: Set of "seriesId_day" — for "delete this event only"

let uid = 1;
let seriesUid = 100;
function mkSeries(days, label, start, end, cat){
  const sid = seriesUid++;
  return days.map(day => ({ id: uid++, seriesId: sid, day, label, start, end, cat }));
}
function mkOne(day, label, start, end, cat){
  return { id: uid++, seriesId: null, day, label, start, end, cat };
}

// Base recurring blocks
let blocks = [
  // Morning routine — all 7 days
  ...mkSeries(['Mon','Tue','Wed','Thu','Fri'],'Morning routine','06:30','07:45','routine'),

  // Car pickup Mon–Fri
  ...mkSeries(['Mon','Tue','Wed','Thu','Fri'],'Car pickup','07:45','08:15','car'),

  // School Mon–Thu
  ...mkSeries(['Mon','Tue','Wed','Thu'],'School','08:15','15:00','school'),

  // School Fri (different end time — separate series)
  mkOne('Fri','School','08:15','14:00','school'),

  // Car drop-off Mon–Thu
  ...mkSeries(['Mon','Tue','Wed','Thu'],'Car drop-off','15:00','15:20','car'),

  // Car drop-off Fri
  mkOne('Fri','Car drop-off','14:00','14:20','car'),

  // Sharon Mon/Tue/Thu
  ...mkSeries(['Mon','Tue','Thu'],'Sharon','15:20','18:00','carer'),

  // Ibrahim Wed/Fri
  ...mkSeries(['Wed','Fri'],'Ibrahim','15:30','16:30','carer'),

  // Clara Fri evening + Sat
  mkOne('Fri','Clara','19:00','22:00','carer'),
  mkOne('Sat','Clara','13:00','18:00','carer'),

  // Fulham FC Mon + Sat
  ...mkSeries(['Mon','Sat'],'Fulham FC','18:00','19:00','activity'),
  // Fix Sat Fulham time
  mkOne('Sat','Fulham FC','09:30','10:30','activity'),

  // Football w/ Costa Sun
  mkOne('Sun','Football w/ Costa','10:00','11:00','activity'),

  // Ibrahim Sun
  mkOne('Sun','Ibrahim','08:00','09:00','carer'),

  // Luis Sun
  mkOne('Sun','Luis','14:00','18:00','carer'),

  // Evening routine all days
  ...mkSeries(['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],'Evening routine','19:30','21:00','routine'),
];

// Remove duplicate Sat Fulham (series added Mon+Sat, then standalone Sat added — remove series Sat)
// Cleaner: rebuild with explicit series
uid = 1; seriesUid = 100;
blocks = [
  ...mkSeries(['Mon','Tue','Wed','Thu','Fri'],'Morning routine','06:30','07:45','routine'),
  ...mkSeries(['Mon','Tue','Wed','Thu','Fri'],'Car pickup','07:45','08:15','car'),
  ...mkSeries(['Mon','Tue','Wed','Thu'],'School','08:15','15:00','school'),
  mkOne('Fri','School','08:15','14:00','school'),
  ...mkSeries(['Mon','Tue','Wed','Thu'],'Car drop-off','15:00','15:20','car'),
  mkOne('Fri','Car drop-off','14:00','14:20','car'),
  ...mkSeries(['Mon','Tue','Thu'],'Sharon','15:20','18:00','carer'),
  ...mkSeries(['Wed','Fri'],'Ibrahim','15:30','16:30','carer'),
  mkOne('Fri','Clara','19:00','22:00','carer'),
  mkOne('Sat','Clara','13:00','18:00','carer'),
  mkOne('Mon','Fulham FC','18:00','19:00','activity'),
  mkOne('Sat','Fulham FC','09:30','10:30','activity'),
  mkOne('Sun','Football w/ Costa','10:00','11:00','activity'),
  mkOne('Sun','Ibrahim','08:00','09:00','carer'),
  mkOne('Sun','Luis','14:00','18:00','carer'),
  ...mkSeries(['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],'Evening routine','19:30','21:00','routine'),
];

// Overrides: key = "seriesId_day", value = partial block props (or null = deleted)
let overrides = {}; // { "sid_day": { label, start, end, cat } }
let deletedOnce = new Set(); // "sid_day"

let nextId = 5000;
let editingId = null, addingDay = null;
let pendingEdit = null, pendingDelete = null;

function overrideKey(b){ return b.seriesId ? b.seriesId+'_'+b.day : null; }

function getEffectiveBlock(b){
  if(!b.seriesId) return b;
  const key = overrideKey(b);
  if(deletedOnce.has(key)) return null;
  if(overrides[key]) return { ...b, ...overrides[key] };
  return b;
}

// ── Render ─────────────────────────────────────────────────
function render(){
  const totalH = GRID_MINS * PPM;

  const headers = document.getElementById('headers');
  headers.innerHTML = '<div class="header-spacer"></div>'+
    DAYS.map((d,i)=>`<div class="header-day${d===todayName?' today':''}" style="color:${DAY_COLORS[i]}">${d}</div>`).join('');

  const axis = document.getElementById('time-axis');
  axis.style.height = totalH+'px'; axis.style.position='relative';
  let axisHTML='';
  for(let h=GRID_START/60;h<=GRID_END/60;h++){
    const top=(h*60-GRID_START)*PPM;
    const label=h<12?h+'am':h===12?'12pm':(h-12)+'pm';
    axisHTML+=`<div class="time-label" style="top:${top}px">${label}</div>`;
  }
  axis.innerHTML=axisHTML;

  const dc=document.getElementById('days-container');
  dc.innerHTML='';
  DAYS.forEach(day=>{
    const col=document.createElement('div');
    col.className='day-col'+(day===todayName?' today':'');
    col.style.height=totalH+'px'; col.style.position='relative';

    for(let h=GRID_START/60;h<=GRID_END/60;h++){
      const top=(h*60-GRID_START)*PPM;
      const line=document.createElement('div');
      line.className='hour-line'; line.style.top=top+'px';
      col.appendChild(line);
      if(h<GRID_END/60){
        const hl=document.createElement('div');
        hl.className='hour-line half'; hl.style.top=(top+30*PPM)+'px';
        col.appendChild(hl);
      }
    }

    blocks.filter(bk=>bk.day===day).forEach(bk=>{
      const eff=getEffectiveBlock(bk);
      if(!eff) return;
      const top=minToTop(eff.start);
      const height=minToHeight(eff.start,eff.end);
      const dur=toMin(eff.end)-toMin(eff.start);
      const div=document.createElement('div');
      div.className='block block-'+eff.cat+(bk.seriesId&&overrides[overrideKey(bk)]?' overridden':'');
      div.style.top=top+'px'; div.style.height=height+'px';
      div.innerHTML=eff.label+(dur>=20?`<span class="tl">${fmt(eff.start)}–${fmt(eff.end)}</span>`:'');
      div.onclick=()=>openEdit(bk.id);
      col.appendChild(div);
    });

    const addBtn=document.createElement('div');
    addBtn.className='add-btn'; addBtn.textContent='＋';
    addBtn.onclick=()=>openAdd(day);
    col.appendChild(addBtn);
    dc.appendChild(col);
  });
}

// ── Edit flow ──────────────────────────────────────────────
function openEdit(id){
  editingId=id; addingDay=null;
  const bk=blocks.find(x=>x.id===id);
  const eff=getEffectiveBlock(bk);
  document.getElementById('edit-title').textContent='Edit block';
  document.getElementById('edit-label').value=eff.label;
  document.getElementById('edit-start').value=eff.start;
  document.getElementById('edit-end').value=eff.end;
  document.getElementById('edit-cat').value=eff.cat;
  document.getElementById('btn-delete').style.display='inline-block';
  document.getElementById('edit-modal').classList.add('open');
}
function openAdd(day){
  editingId=null; addingDay=day;
  document.getElementById('edit-title').textContent='Add block — '+day;
  document.getElementById('edit-label').value='';
  document.getElementById('edit-start').value='09:00';
  document.getElementById('edit-end').value='10:00';
  document.getElementById('edit-cat').value='routine';
  document.getElementById('btn-delete').style.display='none';
  document.getElementById('edit-modal').classList.add('open');
}

document.getElementById('btn-cancel').onclick=()=>document.getElementById('edit-modal').classList.remove('open');

document.getElementById('btn-save').onclick=()=>{
  const label=document.getElementById('edit-label').value.trim()||'Block';
  const start=document.getElementById('edit-start').value;
  const end=document.getElementById('edit-end').value;
  const cat=document.getElementById('edit-cat').value;
  if(!editingId){
    // New one-off block
    blocks.push({id:nextId++,seriesId:null,day:addingDay,label,start,end,cat});
    document.getElementById('edit-modal').classList.remove('open');
    render(); return;
  }
  const bk=blocks.find(x=>x.id===editingId);
  if(!bk.seriesId){
    // One-off: just update directly
    bk.label=label; bk.start=start; bk.end=end; bk.cat=cat;
    document.getElementById('edit-modal').classList.remove('open');
    render(); return;
  }
  // Recurring: ask scope
  pendingEdit={id:editingId,label,start,end,cat};
  document.getElementById('edit-modal').classList.remove('open');
  document.getElementById('scope-title').textContent='Edit "'+label+'"';
  document.getElementById('scope-modal').classList.add('open');
};

document.getElementById('scope-cancel').onclick=()=>document.getElementById('scope-modal').classList.remove('open');

document.getElementById('scope-once').onclick=()=>{
  const {id,label,start,end,cat}=pendingEdit;
  const bk=blocks.find(x=>x.id===id);
  overrides[overrideKey(bk)]={label,start,end,cat};
  document.getElementById('scope-modal').classList.remove('open');
  render();
};

document.getElementById('scope-series').onclick=()=>{
  const {id,label,start,end,cat}=pendingEdit;
  const bk=blocks.find(x=>x.id===id);
  const sid=bk.seriesId;
  // Update all blocks in this series and clear any per-day overrides
  blocks.filter(x=>x.seriesId===sid).forEach(x=>{
    x.label=label; x.start=start; x.end=end; x.cat=cat;
    delete overrides[overrideKey(x)];
  });
  document.getElementById('scope-modal').classList.remove('open');
  render();
};

// ── Delete flow ─────────────────────────────────────────────
document.getElementById('btn-delete').onclick=()=>{
  const bk=blocks.find(x=>x.id===editingId);
  document.getElementById('edit-modal').classList.remove('open');
  if(!bk.seriesId){
    blocks=blocks.filter(x=>x.id!==editingId);
    render(); return;
  }
  pendingDelete=editingId;
  document.getElementById('delete-modal').classList.add('open');
};

document.getElementById('del-cancel').onclick=()=>document.getElementById('delete-modal').classList.remove('open');

document.getElementById('del-once').onclick=()=>{
  const bk=blocks.find(x=>x.id===pendingDelete);
  deletedOnce.add(overrideKey(bk));
  document.getElementById('delete-modal').classList.remove('open');
  render();
};

document.getElementById('del-series').onclick=()=>{
  const bk=blocks.find(x=>x.id===pendingDelete);
  const sid=bk.seriesId;
  blocks=blocks.filter(x=>x.seriesId!==sid);
  document.getElementById('delete-modal').classList.remove('open');
  render();
};

render();
</script>
</body>
</html>
